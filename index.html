// ─── UTILS ────────────────────────────────────────────────────────────────────
function useLS(key, init) {
  const [v,setV] = useState(function(){ try{ var s=localStorage.getItem(key); return s?JSON.parse(s):init; }catch(e){ return init; } });
  const set = function(x){ var n=typeof x==="function"?x(v):x; setV(n); try{localStorage.setItem(key,JSON.stringify(n));}catch(e){} };
  return [v,set];
}

function parseActions(raw) {
  if (!raw) return { text:"", actions:[] };
  var markers = ["##ACCIONES##","[ACCIONES]"], ends = ["##FIN##","[/ACCIONES]"];
  var mi=-1, mLen=0;
  for (var i=0;i<markers.length;i++){ var idx=raw.indexOf(markers[i]); if(idx!==-1){mi=idx;mLen=markers[i].length;break;} }
  if (mi===-1) return { text:raw, actions:[] };
  var blockStart=mi+mLen, blockEnd=raw.length;
  for (var j=0;j<ends.length;j++){ var ei=raw.indexOf(ends[j],blockStart); if(ei!==-1){blockEnd=ei;break;} }
  var actions = raw.slice(blockStart,blockEnd).split("\n")
    .map(function(l){ return l.replace(/^\s*\d+[\.\)]\s*/,"").replace(/^[-*•]\s*/,"").trim(); })
    .filter(function(l){ return l.length>3&&l.length<100; }).slice(0,4);
  var text = (raw.slice(0,mi)+(blockEnd<raw.length?raw.slice(blockEnd+ends[0].length):"")).trim();
  return { text:text||raw.slice(0,mi).trim()||raw, actions:actions };
}

function hasProxy() { return window.location.protocol==="https:" || window.location.hostname==="localhost"; }

async function streamAI({ provider, apiKey, systemPrompt, messages, onChunk }) {
  var full = "";
  var readStream = async function(res, extract) {
    var reader=res.body.getReader(), dec=new TextDecoder();
    while(true){
      var chunk=await reader.read(); if(chunk.done)break;
      var lines=dec.decode(chunk.value,{stream:true}).split("\n");
      for(var i=0;i<lines.length;i++){
        if(!lines[i].startsWith("data: "))continue;
        var data=lines[i].slice(6).trim();
        if(!data||data==="[DONE]")continue;
        try{ var t=extract(JSON.parse(data)); if(t){full+=t;onChunk(full);} }catch(e){}
      }
    }
  };

  if (hasProxy()) {
    var res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({provider,apiKey,systemPrompt,messages})});
    if(!res.ok){var d=null;try{d=await res.json();}catch(e){}throw new Error((d&&d.error)||("HTTP "+res.status));}
    if(provider==="gemini") await readStream(res,function(j){return j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts&&j.candidates[0].content.parts[0]&&j.candidates[0].content.parts[0].text;});
    else await readStream(res,function(j){return j.choices&&j.choices[0]&&j.choices[0].delta&&j.choices[0].delta.content;});
    return full;
  }

  if(provider==="gemini"){
    var contents=(Array.isArray(messages)&&messages.length>0)?messages.map(function(m){return{role:m.role==="assistant"?"model":"user",parts:[{text:m.content||""}]};}): [{role:"user",parts:[{text:"Inicia."}]}];
    if(contents[contents.length-1].role!=="user")contents.push({role:"user",parts:[{text:"continúa"}]});
    var res2=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:streamGenerateContent?alt=sse&key="+apiKey,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({systemInstruction:systemPrompt?{parts:[{text:systemPrompt}]}:undefined,contents,generationConfig:{maxOutputTokens:1400,temperature:0.7}})});
    if(!res2.ok){var d2=null;try{d2=await res2.json();}catch(e){}throw new Error((d2&&d2.error&&d2.error.message)||("Gemini "+res2.status));}
    await readStream(res2,function(j){return j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts&&j.candidates[0].content.parts[0]&&j.candidates[0].content.parts[0].text;});
  } else {
    var msgs=[{role:"system",content:systemPrompt||"Eres un tutor útil."}];
    if(Array.isArray(messages))for(var i=0;i<messages.length;i++)msgs.push({role:messages[i].role,content:messages[i].content});
    var res3=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},body:JSON.stringify({model:TUTOR_PROVIDERS.groq.model,max_tokens:1400,stream:true,messages:msgs})});
    if(!res3.ok){var d3=null;try{d3=await res3.json();}catch(e){}throw new Error((d3&&d3.error&&d3.error.message)||("Groq "+res3.status));}
    await readStream(res3,function(j){return j.choices&&j.choices[0]&&j.choices[0].delta&&j.choices[0].delta.content;});
  }
  return full;
}

function Ring({pct,size,sw,color}){
  pct=pct||0;size=size||48;sw=sw||4;color=color||"#111827";
  var r=(size-sw)/2,c=2*Math.PI*r;
  return <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E7EB" strokeWidth={sw}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={c} strokeDashoffset={c*(1-Math.min(pct,100)/100)} strokeLinecap="round" style={{transition:"stroke-dashoffset .6s ease"}}/>
    <text x="50%" y="50%" textAnchor="middle" dominantBaseline="central" style={{transform:"rotate(90deg)",transformOrigin:"50% 50%",fontSize:size*.21,fontWeight:700,fill:color}}>{Math.round(pct)}%</text>
  </svg>;
}

function Md({text}){
  text=text||"";
  var lines=text.split("\n"),els=[],inCode=false,codeLines=[],lang="",i=0;
  function inline(str,k){
    var parts=str.split(/(`[^`]+`|\*\*[^*]+\*\*)/g);
    return <span key={k}>{parts.map(function(p,j){
      if(p.startsWith("**")&&p.endsWith("**"))return<strong key={j} style={{fontWeight:700}}>{p.slice(2,-2)}</strong>;
      if(p.startsWith("`")&&p.endsWith("`"))return<code key={j} style={{background:"#F1F5F9",color:"#0F172A",padding:"1px 5px",borderRadius:4,fontSize:".88em",fontFamily:"monospace"}}>{p.slice(1,-1)}</code>;
      return p;
    })}</span>;
  }
  while(i<lines.length){
    var l=lines[i];
    if(l.startsWith("```")){
      if(!inCode){inCode=true;lang=l.slice(3);codeLines=[];}
      else{els.push(<div key={i} style={{background:"#1E293B",borderRadius:8,padding:"12px 14px",margin:"8px 0",overflowX:"auto"}}>{lang&&<div style={{fontSize:10,color:"#64748B",marginBottom:4,fontFamily:"monospace"}}>{lang}</div>}<pre style={{margin:0,fontSize:12,color:"#E2E8F0",fontFamily:"'Courier New',monospace",whiteSpace:"pre",lineHeight:1.6}}>{codeLines.join("\n")}</pre></div>);inCode=false;codeLines=[];}
    } else if(inCode){codeLines.push(l);}
    else if(l.match(/^#{1,3} /)){var lv=l.match(/^(#+)/)[1].length,txt=l.replace(/^#+\s/,"");els.push(<div key={i} style={{fontWeight:700,fontSize:lv===1?16:lv===2?14:13,color:"#111827",margin:"12px 0 4px"}}>{inline(txt,0)}</div>);}
    else if(l.match(/^[-*] /)){els.push(<div key={i} style={{display:"flex",gap:8,margin:"3px 0"}}><span style={{color:"#9CA3AF",flexShrink:0,marginTop:2}}>•</span><span style={{fontSize:13,color:"#374151",lineHeight:1.6}}>{inline(l.slice(2),0)}</span></div>);}
    else if(l.trim()===""){els.push(<div key={i} style={{height:5}}/>);}
    else{els.push(<p key={i} style={{margin:"3px 0",fontSize:13,color:"#374151",lineHeight:1.7}}>{inline(l,0)}</p>);}
    i++;
  }
  return <div>{els}</div>;
}

// ─── CHAT ─────────────────────────────────────────────────────────────────────
function Chat({mod,provider,apiKey,trackId}){
  var prov=TUTOR_PROVIDERS[provider];
  var [msgs,setMsgs]=useLS("chat5_"+trackId+"_"+provider+"_"+mod.id,[]);
  var [input,setInput]=useState("");
  var [loading,setLoading]=useState(false);
  var [streaming,setStreaming]=useState("");
  var [actions,setActions]=useState(msgs.length===0?null:getDefaultActions(mod.id));
  var bottomRef=useRef(null);
  var inputRef=useRef(null);

  useEffect(function(){if(bottomRef.current)bottomRef.current.scrollIntoView({behavior:"smooth"});},[msgs,streaming]);
  useEffect(function(){
    var last=null;
    for(var i=msgs.length-1;i>=0;i--){if(msgs[i].role==="assistant"){last=msgs[i];break;}}
    if(last&&last.actions&&last.actions.length)setActions(last.actions);
    else if(msgs.length>0)setActions(getDefaultActions(mod.id));
  },[]);

  function call(userMsg,history){
    setLoading(true);setStreaming("");setActions(null);
    var allMsgs=history.concat([{role:"user",content:userMsg}]);
    streamAI({provider,apiKey,systemPrompt:mod.system,messages:allMsgs,onChunk:function(t){setStreaming(t);}})
    .then(function(full){
      setStreaming("");
      var parsed=parseActions(full);
      var acts=parsed.actions.length>0?parsed.actions:getDefaultActions(mod.id);
      setMsgs(history.concat([{role:"user",content:userMsg},{role:"assistant",content:full,cleanText:parsed.text,actions:acts}]));
      setActions(acts);
    }).catch(function(e){
      setStreaming("");
      var msg=e.message||"Error";
      if(msg.includes("401")||msg.toLowerCase().includes("invalid"))msg="❌ API key inválida. Ve a Ajustes y verifica tu key de "+(provider==="gemini"?"aistudio.google.com":"console.groq.com");
      else if(msg.includes("429"))msg="⏳ Límite alcanzado. Espera un momento e intenta de nuevo.";
      var acts=getDefaultActions(mod.id);
      setMsgs(history.concat([{role:"user",content:userMsg},{role:"assistant",content:"⚠️ "+msg,cleanText:"⚠️ "+msg,actions:acts}]));
      setActions(acts);
    }).finally(function(){setLoading(false);setTimeout(function(){if(inputRef.current)inputRef.current.focus();},80);});
  }

  function send(){var t=input.trim();if(!t||loading)return;setInput("");call(t,msgs);}

  var starters=["Hola! Quiero comenzar el módulo \""+mod.name+"\". Dame una primera sesión práctica de 2 horas con los conceptos clave y un ejercicio concreto para empezar ahora mismo.","Dame un ejercicio práctico para hacer ahora","Explícame el concepto más importante","¿Cómo sé si estoy listo para el siguiente módulo?"];

  return <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderBottom:"1px solid #F3F4F6",flexShrink:0,background:"white"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:30,height:30,borderRadius:8,background:mod.color.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>{mod.emoji}</div>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:"#111827"}}>Tutor IA — {mod.id}</div>
          <div style={{display:"flex",alignItems:"center",gap:4,marginTop:1}}><span style={{fontSize:9}}>{prov.emoji}</span><span style={{fontSize:10,color:"#9CA3AF"}}>{prov.name} · {prov.model}</span></div>
        </div>
      </div>
      {msgs.length>0&&<button onClick={function(){if(window.confirm("¿Borrar historial?")){setMsgs([]);setActions(null);}}} style={{fontSize:11,color:"#9CA3AF",background:"none",border:"1px solid #E5E7EB",borderRadius:6,padding:"4px 8px",cursor:"pointer"}}>Nueva sesión</button>}
    </div>

    <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:12,minHeight:0}}>
      {msgs.length===0&&!loading&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:260,gap:16,padding:"20px 0"}}>
        <div style={{width:64,height:64,borderRadius:20,background:mod.color.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>{mod.emoji}</div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:"#111827",marginBottom:4}}>Tutor listo</div>
          <div style={{fontSize:12,color:"#6B7280",maxWidth:280,lineHeight:1.6,margin:"0 auto"}}>Especializado en <strong>{mod.name}</strong></div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:7,width:"100%",maxWidth:360}}>
          {starters.map(function(q,i){return(

}

// ─── SUBMODULE CARD ────────────────────────────────────────────────────────────
function SubCard({sub,topicChecked,projDone,onTopic,onProj}){
  var [open,setOpen]=useState(false);
  var done=(topicChecked||[]).filter(Boolean).length+Object.values(projDone||{}).filter(Boolean).length;
  var total=sub.topics.length+sub.projects.length;
  var pct=total>0?Math.round(done/total*100):0;
  return <div style={{border:"1.5px solid "+sub.color+"30",borderRadius:12,overflow:"hidden",marginBottom:8}}>
    <div onClick={function(){setOpen(!open);}} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:sub.bg,cursor:"pointer",userSelect:"none"}}>
      <span style={{fontSize:18}}>{sub.icon}</span>
      <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:sub.color}}>{sub.name}</div><div style={{fontSize:11,color:"#6B7280",marginTop:1}}>{sub.dur} · {sub.topics.length} temas</div></div>
      <Ring pct={pct} size={36} sw={3} color={sub.color}/>
      <span style={{fontSize:10,color:"#9CA3AF",transition:".2s",transform:open?"rotate(180deg)":"none"}}>▼</span>
    </div>
    {open&&<div style={{padding:12,background:"white",borderTop:"1px solid "+sub.color+"15"}}>
      <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Temas</div>
      {sub.topics.map(function(t,i){return(
        <label key={i} onClick={function(){onTopic(i);}} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"7px 8px",borderRadius:7,cursor:"pointer",background:(topicChecked||[])[i]?"#F0FDF4":"transparent",marginBottom:3}}>
          <div style={{width:16,height:16,borderRadius:4,border:"2px solid "+((topicChecked||[])[i]?sub.color:"#D1D5DB"),background:(topicChecked||[])[i]?sub.color:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>{(topicChecked||[])[i]&&<span style={{color:"white",fontSize:9}}>✓</span>}</div>
          <span style={{fontSize:12,color:(topicChecked||[])[i]?"#166534":"#374151",textDecoration:(topicChecked||[])[i]?"line-through":"none",lineHeight:1.5}}>{t}</span>
        </label>
      );})}
      <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".05em",margin:"12px 0 8px"}}>Proyectos</div>
      {sub.projects.map(function(p,pi){return(
        <div key={pi} style={{border:"1px solid "+((projDone||{})[pi]?"#86EFAC":"#E5E7EB"),borderRadius:8,padding:"10px 12px",background:(projDone||{})[pi]?"#F0FDF4":"white",marginBottom:6,display:"flex",gap:10}}>
          <div onClick={function(){onProj(pi);}} style={{width:20,height:20,borderRadius:5,border:"2px solid "+((projDone||{})[pi]?sub.color:"#D1D5DB"),background:(projDone||{})[pi]?sub.color:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",marginTop:1}}>{(projDone||{})[pi]&&<span style={{color:"white",fontSize:10}}>✓</span>}</div>
          <div><div style={{fontSize:12,fontWeight:700,color:"#111827",marginBottom:2}}>{p.t} <Pill label={p.tag} color={sub.color} bg={sub.bg}/></div><div style={{fontSize:11,color:"#6B7280"}}>{p.d}</div></div>
        </div>
      );})}
    </div>}
  </div>;
}

// ─── MODULE DETAIL ─────────────────────────────────────────────────────────────
function ModDetail({mod,progress,onProgress,provider,apiKey,trackId}){

  var top=progress.topics||[],prj=progress.projects||{};
  function toggleTopic(i){var n=[...top];n[i]=!n[i];onProgress({...progress,topics:n});}
  function toggleProj(pi){onProgress({...progress,projects:{...prj,[pi]:!prj[pi]}});}
  function toggleSubT(sid,i){var st=progress.subTopics||{};var c=st[sid]||[];var n=[...c];n[i]=!n[i];onProgress({...progress,subTopics:{...st,[sid]:n}});}
  function toggleSubP(sid,pi){var sp=progress.subProjs||{};var c=sp[sid]||{};onProgress({...progress,subProjs:{...sp,[sid]:{...c,[pi]:!c[pi]}}});}

  else{total=mod.topics.length+mod.projects.length;done=top.filter(Boolean).length+Object.values(prj).filter(Boolean).length;}

    <div style={{padding:"14px 14px 0",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:12}}>

        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}><span style={{fontSize:10,color:"#9CA3AF",fontWeight:700}}>{mod.id}</span><Pill label={mod.level} color={mod.color.t} bg={mod.color.bg}/></div>
          <h2 style={{fontSize:16,fontWeight:800,color:"#111827",margin:"0 0 2px",lineHeight:1.3}}>{mod.name}</h2>
          <p style={{fontSize:11,color:"#6B7280",margin:0}}>{mod.weeks} · {mod.hours}</p>
        </div>
        <Ring pct={pct} size={44} sw={4} color={mod.color.t}/>
      </div>
    </div>
    <div style={{display:"flex",borderBottom:"1px solid #F3F4F6",flexShrink:0,padding:"0 14px"}}>
      <Tab id="contenido" label="Contenido" icon="📋"/>

    <div style={{flex:1,overflow:tab==="ia"?"hidden":"auto",display:"flex",flexDirection:"column",minHeight:0}}>
      {tab==="contenido"&&<div style={{padding:"14px",paddingBottom:60,overflowY:"auto"}}>
        {mod.submodules?<>
          <div style={{background:"#FFFBEB",border:"1px solid #FCD34D",borderRadius:10,padding:"10px 12px",marginBottom:14,display:"flex",gap:8}}>
            <span style={{fontSize:14,flexShrink:0}}>💡</span>

          </div>
          {mod.submodules.map(function(sub){return<SubCard key={sub.id} sub={sub} topicChecked={(progress.subTopics||{})[sub.id]} projDone={(progress.subProjs||{})[sub.id]} onTopic={function(i){toggleSubT(sub.id,i);}} onProj={function(pi){toggleSubP(sub.id,pi);}}/>;})}</>
        :<>
          <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".05em",marginBottom:10}}>Temas</div>
          {mod.topics.map(function(t,i){return(
            <label key={i} onClick={function(){toggleTopic(i);}} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 10px",borderRadius:8,cursor:"pointer",marginBottom:4,background:top[i]?"#F0FDF4":"#FAFAFA",border:"1px solid "+(top[i]?"#86EFAC":"#F3F4F6"),transition:"all .15s"}}>
              <div style={{width:18,height:18,borderRadius:5,border:"2px solid "+(top[i]?mod.color.t:"#D1D5DB"),background:top[i]?mod.color.t:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>{top[i]&&<span style={{color:"white",fontSize:9}}>✓</span>}</div>
              <span style={{fontSize:13,color:top[i]?"#166534":"#374151",textDecoration:top[i]?"line-through":"none",lineHeight:1.5}}>{t}</span>
            </label>
          );})}
          <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".05em",margin:"16px 0 10px"}}>Proyectos hands-on</div>
          {mod.projects.map(function(p,pi){return(
            <div key={pi} style={{border:"1px solid "+(prj[pi]?"#86EFAC":"#E5E7EB"),borderRadius:10,padding:"12px",background:prj[pi]?"#F0FDF4":"white",marginBottom:8,display:"flex",gap:10}}>

                <p style={{fontSize:12,color:prj[pi]?"#15803D":"#6B7280",margin:0,lineHeight:1.5}}>{p.d}</p>
              </div>
            </div>
          );})}
        </>}
        <div style={{marginTop:16,padding:"12px",background:mod.color.bg,border:"1px solid "+mod.color.b,borderRadius:10,display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:18}}>🤖</span>
          <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:mod.color.t,marginBottom:2}}>¿Listo para practicar?</div><div style={{fontSize:11,color:"#6B7280"}}>Ve al Tutor IA para sesiones guiadas</div></div>
          <button onClick={function(){setTab("ia");}} style={{background:mod.color.t,color:"white",border:"none",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0,fontFamily:"inherit"}}>Ir →</button>
        </div>
      </div>}
      {tab==="ia"&&<div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0,overflow:"hidden"}}><Chat mod={mod} provider={provider} apiKey={apiKey} trackId={trackId}/></div>}
    </div>
  </div>;
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function Sidebar({track,progMap,activeModId,onSelect,onSettings,onChangeTrack}){
  var pct=function(mod){
    var p=progMap[mod.id]||{};var total=0,done=0;
    if(mod.submodules){mod.submodules.forEach(function(s){total+=s.topics.length+s.projects.length;var st=(p.subTopics||{})[s.id]||[];var sp=(p.subProjs||{})[s.id]||{};done+=st.filter(Boolean).length+Object.values(sp).filter(Boolean).length;});}
    else{total=mod.topics.length+mod.projects.length;done=(p.topics||[]).filter(Boolean).length+Object.values(p.projects||{}).filter(Boolean).length;}
    return total>0?Math.round(done/total*100):0;
  };
  var gp=Math.round(track.modules.reduce(function(a,m){return a+pct(m);},0)/track.modules.length);
  return <div id="sidebar" style={{display:"flex",flexDirection:"column",background:"white",height:"100vh",overflow:"hidden"}}>
    <div style={{padding:"16px 14px 12px",borderBottom:"1px solid #F3F4F6",flexShrink:0}}>

        <span style={{fontSize:24}}>{track.emoji}</span>
        <div style={{flex:1,textAlign:"left"}}>
          <div style={{fontSize:14,fontWeight:800,color:track.color}}>{track.name} Bootcamp</div>
          <div style={{fontSize:10,color:"#9CA3AF"}}>{track.subtitle} · Cambiar track →</div>
        </div>
      </button>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{flex:1}}><div style={{height:4,background:"#F3F4F6",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:gp+"%",background:track.color,borderRadius:4,transition:"width .6s"}}/></div><div style={{fontSize:10,color:"#9CA3AF",marginTop:3}}>{gp}% completado</div></div>
        <Ring pct={gp} size={36} sw={3} color={track.color}/>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"8px 8px"}}>
      {track.modules.map(function(mod){

          <div style={{width:32,height:32,borderRadius:8,background:mod.color.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{mod.emoji}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:isActive?700:500,color:isActive?track.color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{mod.name}</div>
            <div style={{fontSize:10,color:"#9CA3AF",marginTop:1}}>{mod.weeks}</div>
          </div>
          <Ring pct={p} size={28} sw={2.5} color={isActive?track.color:p>0?mod.color.t:"#D1D5DB"}/>
        </button>;
      })}
    </div>
    <div style={{padding:"10px",borderTop:"1px solid #F3F4F6",flexShrink:0}}>
      <button onClick={onSettings} style={{width:"100%",padding:"9px",borderRadius:8,border:"1px solid #E5E7EB",background:"#F9FAFB",fontSize:11,color:"#6B7280",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,fontFamily:"inherit"}}>⚙️ Ajustes</button>
    </div>
  </div>;

      </div>
      <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Motor del Tutor IA (gratuito)</div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
        {Object.values(TUTOR_PROVIDERS).map(function(p){return(
          <button key={p.id} onClick={function(){setProvider(p.id);setKey("");setErr("");}} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",borderRadius:14,border:"2px solid "+(provider===p.id?p.color:"#E5E7EB"),background:provider===p.id?p.bg:"white",cursor:"pointer",textAlign:"left",transition:"all .15s",width:"100%",fontFamily:"inherit"}}>
            <span style={{fontSize:22,flexShrink:0}}>{p.emoji}</span>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:14,fontWeight:700,color:"#111827"}}>{p.name}</span>{p.recommended&&<span style={{fontSize:10,fontWeight:700,background:"#ECFDF5",color:"#047857",padding:"1px 7px",borderRadius:20}}>Recomendado</span>}</div>
              <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>{p.limits.map(function(l,i){return<span key={i} style={{fontSize:10,color:"#6B7280",background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:6,padding:"2px 6px"}}>{l}</span>;})}</div>
            </div>
            <div style={{width:20,height:20,borderRadius:"50%",border:"2px solid "+(provider===p.id?p.color:"#D1D5DB"),background:provider===p.id?p.color:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{provider===p.id&&<div style={{width:8,height:8,borderRadius:"50%",background:"white"}}/>}</div>
          </button>
        );})}
      </div>
      <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>API Key de {prov.name}</div>
      <input value={key} onChange={function(e){setKey(e.target.value.trim());setErr("");}} placeholder={prov.keyPlaceholder} type="password"
        style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1.5px solid "+(err?"#FECACA":key?prov.color:"#E5E7EB"),fontSize:13,outline:"none",fontFamily:"monospace",marginBottom:6,background:err?"#FEF2F2":"white"}}/>
      {err&&<p style={{fontSize:12,color:"#B91C1C",marginBottom:8,padding:"6px 10px",background:"#FEF2F2",borderRadius:8}}>{err}</p>}
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12,padding:"8px 10px",background:"#F9FAFB",borderRadius:8,border:"1px solid #E5E7EB"}}>
        <span style={{fontSize:13}}>🔗</span><span style={{fontSize:11,color:"#6B7280"}}>{prov.keyHint} — </span>
        <a href={prov.keyUrl} target="_blank" rel="noreferrer" style={{fontSize:11,color:prov.color,fontWeight:700,textDecoration:"none"}}>Ir ahora →</a>
      </div>
      <div style={{background:"#F0FDF4",border:"1px solid #A7F3D0",borderRadius:10,padding:"9px 12px",marginBottom:20,display:"flex",gap:8}}>
        <span style={{fontSize:13,flexShrink:0}}>🔒</span>
        <p style={{fontSize:11,color:"#065F46",margin:0,lineHeight:1.5}}>Tu key se guarda <strong>solo en este navegador</strong>. Nunca sale a ningún servidor.</p>
      </div>
      <button onClick={verify} disabled={!key} style={{width:"100%",padding:13,borderRadius:12,border:"none",background:!key?"#E5E7EB":prov.color,color:!key?"#9CA3AF":"white",fontSize:14,fontWeight:700,cursor:!key?"not-allowed":"pointer",fontFamily:"inherit",boxShadow:!key?"none":"0 4px 12px "+prov.color+"40"}}>
        Guardar y elegir track →
      </button>
    </div>
  </div>;
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function Settings({provider,onChangeProvider,onClearAll,onBack}){
  var prov=TUTOR_PROVIDERS[provider];
  var [confirmDel,setConfirmDel]=useState(false);
  return <div style={{padding:"20px 16px",maxWidth:440,margin:"0 auto"}}>
    <h2 style={{fontSize:18,fontWeight:800,color:"#111827",marginBottom:16}}>Ajustes</h2>
    <div style={{background:prov.bg,border:"1.5px solid "+prov.border,borderRadius:12,padding:"12px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:20}}>{prov.emoji}</span>
      <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:2}}>Motor activo del Tutor IA</div><div style={{fontSize:13,fontWeight:700,color:prov.color}}>{prov.name} · {prov.model}</div></div>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <button onClick={onChangeProvider} style={{padding:"14px",borderRadius:12,border:"1px solid #E5E7EB",background:"white",fontSize:13,fontWeight:700,color:"#111827",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10,fontFamily:"inherit"}}>🔄 <span>Cambiar motor del tutor o API key</span></button>
      {!confirmDel
        ?<button onClick={function(){setConfirmDel(true);}} style={{padding:"14px",borderRadius:12,border:"1px solid #FECACA",background:"#FEF2F2",fontSize:13,fontWeight:700,color:"#B91C1C",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10,fontFamily:"inherit"}}>🗑️ <span>Borrar todo el progreso y claves</span></button>
        :<div style={{padding:"14px",borderRadius:12,border:"1px solid #FECACA",background:"#FEF2F2"}}>
          <p style={{fontSize:13,color:"#B91C1C",marginBottom:10}}>¿Seguro? Se borrará todo el progreso e historial de los 3 tracks.</p>
          <div style={{display:"flex",gap:8}}>
            <button onClick={function(){setConfirmDel(false);}} style={{flex:1,padding:"9px",borderRadius:8,border:"1px solid #E5E7EB",background:"white",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Cancelar</button>
            <button onClick={onClearAll} style={{flex:1,padding:"9px",borderRadius:8,border:"none",background:"#B91C1C",color:"white",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Sí, borrar todo</button>
          </div>
        </div>
      }
    </div>
  </div>;
}

// ─── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  var [cfg,setCfg]=useLS("aim_cfg_v1",null);
  var [trackId,setTrackId]=useLS("aim_track_v1",null);
  var [progMap,setProgMap]=useLS("aim_prog_v1",{});
  var [view,setView]=useState("home");
  var [setupMode,setSetupMode]=useState(false);
  var [trackMode,setTrackMode]=useState(false);

  var needSetup=!cfg||!cfg.apiKey;
  var needTrack=!trackId;

  function clearAll(){
    Object.keys(localStorage).filter(function(k){return k.startsWith("aim_")||k.startsWith("chat5_");}).forEach(function(k){localStorage.removeItem(k);});
    setCfg(null);setTrackId(null);setProgMap({});setSetupMode(true);setTrackMode(false);setView("home");
  }

  if(needSetup||setupMode) return <Setup onSave={function(provider,apiKey){setCfg({provider,apiKey});setSetupMode(false);}}/>;
  if(needTrack||trackMode) return <TrackSelector progMap={progMap} onSelect={function(id){setTrackId(id);setTrackMode(false);setView("home");}}/>;

  var track=ALL_TRACKS[trackId];
  if(!track){setTrackId(null);return null;}

  var activeModId=view.startsWith("m:")?view.slice(2):null;
  var activeMod=activeModId?track.modules.find(function(m){return m.id===activeModId;}):null;

  // Use per-track progress key
  var trackProgKey=trackId+"_";
  function getModProgress(modId){ return progMap[trackProgKey+modId]||{}; }
  function setModProgress(modId,p){ setProgMap(function(prev){ var next=Object.assign({},prev); next[trackProgKey+modId]=p; return next; }); }

  return <div id="app-shell" style={{display:"flex",flexDirection:"column",height:"100vh",background:"#F0EFE9",maxWidth:520,margin:"0 auto",boxShadow:"0 0 40px rgba(0,0,0,.08)",fontFamily:"inherit",width:"100%"}}>

    <Sidebar track={track} progMap={Object.fromEntries(track.modules.map(function(m){return[m.id,getModProgress(m.id)];}))} activeModId={activeModId} onSelect={function(id){setView("m:"+id);}} onSettings={function(){setView("settings");}} onChangeTrack={function(){setTrackMode(true);}}/>

    <div id="main-panel" style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,overflow:"hidden"}}>
      {/* Mobile nav */}
      <div id="mobile-nav" style={{position:"sticky",top:0,zIndex:100,background:"rgba(255,255,255,.97)",backdropFilter:"blur(10px)",borderBottom:"1px solid #F3F4F6",padding:"0 14px",height:50,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        {view!=="home"&&<button onClick={function(){setView("home");}} style={{background:"none",border:"none",cursor:"pointer",color:"#374151",fontSize:20,padding:"0 6px 0 0",display:"flex",alignItems:"center",flexShrink:0,fontFamily:"inherit"}}>←</button>}
        <div style={{display:"flex",alignItems:"center",gap:7,flex:1,minWidth:0}}>
          <div style={{width:26,height:26,borderRadius:7,background:track.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:"white",flexShrink:0}}>{track.emoji}</div>
          <span style={{fontSize:13,fontWeight:700,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{activeMod?activeMod.emoji+" "+activeMod.name:view==="settings"?"Ajustes":track.name+" Bootcamp"}</span>
        </div>
        <button onClick={function(){setTrackMode(true);}} style={{fontSize:10,color:track.color,background:track.bg,border:"1px solid "+track.border,borderRadius:20,padding:"3px 8px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,flexShrink:0}}>Cambiar</button>
      </div>

      {/* Desktop header */}
      {activeMod&&<div id="desktop-header" style={{display:"none",alignItems:"center",gap:12,padding:"12px 20px",borderBottom:"1px solid #F3F4F6",background:"white",flexShrink:0}}>
        <div style={{width:38,height:38,borderRadius:10,background:activeMod.color.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{activeMod.emoji}</div>
        <div><div style={{fontSize:11,color:"#9CA3AF",fontWeight:700}}>{activeMod.id} · {activeMod.level.toUpperCase()}</div><div style={{fontSize:15,fontWeight:800,color:"#111827"}}>{activeMod.name}</div></div>
      </div>}
      {!activeMod&&view==="settings"&&<div id="desktop-header" style={{display:"none",alignItems:"center",gap:10,padding:"12px 20px",borderBottom:"1px solid #F3F4F6",background:"white",flexShrink:0}}><div style={{fontSize:15,fontWeight:800,color:"#111827"}}>⚙️ Ajustes</div></div>}

      <div style={{flex:1,overflow:activeMod?"hidden":"auto",display:"flex",flexDirection:"column",minHeight:0}}>
        {activeMod?(
          <ModDetail mod={activeMod} progress={getModProgress(activeMod.id)} onProgress={function(p){setModProgress(activeMod.id,p);}} provider={cfg.provider} apiKey={cfg.apiKey} trackId={trackId}/>
        ):view==="settings"?(
          <Settings provider={cfg.provider} onChangeProvider={function(){setSetupMode(true);}} onClearAll={clearAll}/>
        ):(
          // Home: module grid for current track
          <div style={{overflowY:"auto",flex:1,paddingBottom:40}}>
            <div style={{padding:"20px 16px 14px",borderBottom:"1px solid #E5E7EB",background:"white"}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:"#9CA3AF",letterSpacing:".08em",textTransform:"uppercase",marginBottom:5}}>{track.name} Bootcamp · 12 semanas · 2–4h/día</div>
                  <h1 style={{fontSize:20,fontWeight:900,color:"#111827",margin:"0 0 4px",lineHeight:1.2}}>Domina {track.name}</h1>
                  <p style={{fontSize:12,color:"#6B7280",margin:0}}>{track.desc}</p>
                </div>
                <Ring pct={Math.round(track.modules.reduce(function(a,m){var p=getModProgress(m.id);var total=0,done=0;if(m.submodules){m.submodules.forEach(function(s){total+=s.topics.length+s.projects.length;var st=(p.subTopics||{})[s.id]||[];var sp=(p.subProjs||{})[s.id]||{};done+=st.filter(Boolean).length+Object.values(sp).filter(Boolean).length;});}else{total=m.topics.length+m.projects.length;done=(p.topics||[]).filter(Boolean).length+Object.values(p.projects||{}).filter(Boolean).length;}return a+(total>0?Math.round(done/total*100):0);},0)/track.modules.length)} size={56} sw={5} color={track.color}/>
              </div>
              <div style={{height:5,background:"#F3F4F6",borderRadius:5,overflow:"hidden",marginTop:12}}>
                <div style={{height:"100%",width:Math.round(track.modules.reduce(function(a,m){var p=getModProgress(m.id);var total=0,done=0;if(m.submodules){m.submodules.forEach(function(s){total+=s.topics.length+s.projects.length;var st=(p.subTopics||{})[s.id]||[];var sp=(p.subProjs||{})[s.id]||{};done+=st.filter(Boolean).length+Object.values(sp).filter(Boolean).length;});}else{total=m.topics.length+m.projects.length;done=(p.topics||[]).filter(Boolean).length+Object.values(p.projects||{}).filter(Boolean).length;}return a+(total>0?Math.round(done/total*100):0);},0)/track.modules.length)+"%",background:track.color,borderRadius:5,transition:"width .6s"}}/>
              </div>
            </div>
            <div style={{padding:"14px"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Módulos</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {track.modules.map(function(mod){
                  var p=getModProgress(mod.id);var total=0,done=0;
                  if(mod.submodules){mod.submodules.forEach(function(s){total+=s.topics.length+s.projects.length;var st=(p.subTopics||{})[s.id]||[];var sp=(p.subProjs||{})[s.id]||{};done+=st.filter(Boolean).length+Object.values(sp).filter(Boolean).length;});}
                  else{total=mod.topics.length+mod.projects.length;done=(p.topics||[]).filter(Boolean).length+Object.values(p.projects||{}).filter(Boolean).length;}
                  var pct=total>0?Math.round(done/total*100):0;
                  return <button key={mod.id} onClick={function(){setView("m:"+mod.id);}} style={{display:"flex",alignItems:"center",gap:12,padding:"13px",borderRadius:14,border:"1.5px solid "+(pct>0?mod.color.b:"#E5E7EB"),background:pct>0?mod.color.bg+"BB":"white",cursor:"pointer",textAlign:"left",transition:"all .15s",width:"100%",fontFamily:"inherit"}}>
                    <div style={{width:42,height:42,borderRadius:11,background:mod.color.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{mod.emoji}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2,flexWrap:"wrap"}}><span style={{fontSize:9,color:"#9CA3AF",fontWeight:700}}>{mod.id}</span><Pill label={mod.level} color={mod.color.t} bg={mod.color.bg}/>{mod.submodules&&<Pill label="3 sub-mód." color="#6D28D9" bg="#F5F3FF"/>}</div>
                      <div style={{fontSize:14,fontWeight:700,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{mod.name}</div>
                      <div style={{fontSize:11,color:"#6B7280",marginTop:1}}>{mod.weeks} · {mod.hours}</div>
                    </div>
                    <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                      <Ring pct={pct} size={38} sw={3} color={mod.color.t}/>
                      <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:6,height:6,borderRadius:"50%",background:pct===100?"#22C55E":pct>0?"#F59E0B":"#E5E7EB"}}/><span style={{fontSize:10,color:"#9CA3AF"}}>{pct===100?"Completo":pct>0?"En curso":"Pendiente"}</span></div>
                    </div>
                  </button>;
                })}
              </div>
              <button onClick={function(){setView("settings");}} style={{marginTop:14,width:"100%",padding:"11px",borderRadius:10,border:"1px solid #E5E7EB",background:"#F9FAFB",fontSize:12,color:"#6B7280",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontFamily:"inherit"}}>⚙️ Ajustes (cambiar motor IA, borrar progreso)</button>
            </div>
          </div>
        )}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
